<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Book shape -->
  <rect x="100" y="140" width="140" height="220" rx="12" fill="#312e81" stroke="#818cf8" stroke-width="3"/>
  <rect x="272" y="140" width="140" height="220" rx="12" fill="#312e81" stroke="#818cf8" stroke-width="3"/>
  <!-- Book spine -->
  <rect x="236" y="135" width="40" height="230" rx="6" fill="url(#accent)"/>
  <!-- Lines on book pages -->
  <line x1="120" y1="180" x2="225" y2="180" stroke="#818cf8" stroke-width="3" opacity="0.6"/>
  <line x1="120" y1="205" x2="225" y2="205" stroke="#818cf8" stroke-width="3" opacity="0.6"/>
  <line x1="120" y1="230" x2="225" y2="230" stroke="#818cf8" stroke-width="3" opacity="0.6"/>
  <line x1="120" y1="255" x2="225" y2="255" stroke="#818cf8" stroke-width="3" opacity="0.4"/>
  <line x1="287" y1="180" x2="392" y2="180" stroke="#818cf8" stroke-width="3" opacity="0.6"/>
  <line x1="287" y1="205" x2="392" y2="205" stroke="#818cf8" stroke-width="3" opacity="0.6"/>
  <line x1="287" y1="230" x2="392" y2="230" stroke="#818cf8" stroke-width="3" opacity="0.6"/>
  <!-- Math symbols floating -->
  <text x="140" y="310" font-size="44" text-anchor="middle" fill="#a5b4fc" font-family="Arial" font-weight="bold">π</text>
  <text x="370" y="310" font-size="40" text-anchor="middle" fill="#a5b4fc" font-family="Arial" font-weight="bold">∞</text>
  <!-- Bottom text -->
  <text x="256" y="418" font-size="40" text-anchor="middle" fill="#e0e7ff" font-family="Arial, sans-serif" font-weight="bold">수학여행</text>
  <text x="256" y="462" font-size="28" text-anchor="middle" fill="#818cf8" font-family="Arial, sans-serif">영통학원</text>
  <!-- Border -->
  <rect x="8" y="8" width="496" height="496" rx="76" fill="none" stroke="#818cf8" stroke-width="3" opacity="0.4"/>
</svg>
